name: 编译APK

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: 安装 Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: 安装 Android SDK
        run: |
          export ANDROID_HOME=$HOME/android-sdk
          echo "ANDROID_HOME=$ANDROID_HOME" >> $GITHUB_ENV
          mkdir -p $ANDROID_HOME/cmdline-tools
          cd $ANDROID_HOME/cmdline-tools
          curl -sLO https://dl.google.com/android/repository/commandlinetools-linux-11076708_latest.zip
          unzip -qo commandlinetools-linux-11076708_latest.zip
          mv cmdline-tools latest
          echo "$ANDROID_HOME/cmdline-tools/latest/bin" >> $GITHUB_PATH
          yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --licenses > /dev/null 2>&1
          $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager "platforms;android-34" "build-tools;34.0.0" "platform-tools"

      - name: 安装 Gradle
        run: |
          curl -sL https://services.gradle.org/distributions/gradle-8.5-bin.zip -o /tmp/gradle.zip
          sudo mkdir -p /opt/gradle
          sudo unzip -qo /tmp/gradle.zip -d /opt/gradle
          echo "/opt/gradle/gradle-8.5/bin" >> $GITHUB_PATH

      - name: 编译 Debug APK
        run: |
          cd android
          echo "sdk.dir=$ANDROID_HOME" > local.properties
          gradle assembleDebug

      - name: 上传 APK
        uses: actions/upload-artifact@v4
        with:
          name: 切水果-APK
          path: android/app/build/outputs/apk/debug/*.apk
