name: 编译APK

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: 设置 Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: 安装 Android SDK
        run: |
          ANDROID_SDK_ROOT=$HOME/android-sdk
          echo "ANDROID_SDK_ROOT=$ANDROID_SDK_ROOT" >> $GITHUB_ENV
          echo "ANDROID_HOME=$ANDROID_SDK_ROOT" >> $GITHUB_ENV

          mkdir -p $ANDROID_SDK_ROOT/cmdline-tools
          cd $ANDROID_SDK_ROOT/cmdline-tools
          curl -sLO https://dl.google.com/android/repository/commandlinetools-linux-11076708_latest.zip
          unzip -qo commandlinetools-linux-11076708_latest.zip
          # The zip extracts to cmdline-tools/ directory
          if [ -d cmdline-tools ]; then
            mv cmdline-tools latest
          fi
          echo "$ANDROID_SDK_ROOT/cmdline-tools/latest/bin" >> $GITHUB_PATH

      - name: 安装 SDK 包
        run: |
          yes | $ANDROID_SDK_ROOT/cmdline-tools/latest/bin/sdkmanager --licenses > /dev/null 2>&1
          $ANDROID_SDK_ROOT/cmdline-tools/latest/bin/sdkmanager "platforms;android-34" "build-tools;34.0.0" "platform-tools"

      - name: 编译 APK
        working-directory: android
        run: |
          echo "sdk.dir=$ANDROID_HOME" > local.properties
          # Create Gradle wrapper if not present
          if [ ! -f gradlew ]; then
            gradle wrapper --gradle-version 8.5 2>/dev/null || {
              curl -sL https://services.gradle.org/distributions/gradle-8.5-bin.zip -o /tmp/gradle.zip
              unzip -qo /tmp/gradle.zip -d /tmp
              /tmp/gradle-8.5/bin/gradle wrapper --gradle-version 8.5
            }
          fi
          ./gradlew assembleDebug

      - name: 上传 APK
        uses: actions/upload-artifact@v4
        with:
          name: 切水果-APK
          path: android/app/build/outputs/apk/debug/*.apk
